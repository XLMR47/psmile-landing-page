# example netlify.toml
[build]
  command = "npm run build"
  functions = "netlify/functions"
  publish = "dist"

# SPA Redirect - Required for React Router to work in production
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.processing.secrets_scan]
  omit_keys = ["VITE_GROQ_API_KEY"]
